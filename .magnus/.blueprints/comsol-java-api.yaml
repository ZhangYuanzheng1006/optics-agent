kind: magnus/skill
version: '1.0'
payload:
  id: comsol-java-api
  title: COMSOL Java API
  description: Use when Codex needs to read, write, debug, or summarize COMSOL Java API model files, GUI-exported Java models,
    geometry/mesh/study/solver/results API calls, COMSOL batch Java files, or convert COMSOL Java API/manual knowledge into
    executable model templates for optics_agent headless COMSOL workflows.
  files:
    - path: agents/openai.yaml
      content: |+
        interface:
          display_name: "COMSOL Java API"
          short_description: "COMSOL Java model API reference"
          default_prompt: "Use $comsol-java-api to read, write, or debug a COMSOL Java model file for headless batch execution."

    - path: assets/templates/BasicModel.java
      content: |
        import com.comsol.model.*;
        import com.comsol.model.util.*;

        public class BasicModel {
          public static Model run() throws Exception {
            Model model = ModelUtil.create("Model");
            model.modelNode().create("comp1");
            model.param().set("L", "1[um]");
            model.param().set("W", "0.5[um]");
            model.geom().create("geom1", 2);
            model.geom("geom1").lengthUnit("um");
            model.geom("geom1").create("r1", "Rectangle");
            model.geom("geom1").feature("r1").set("size", new String[]{"L", "W"});
            model.geom("geom1").feature("r1").set("pos", new String[]{"-L/2", "-W/2"});
            model.geom("geom1").run();
            model.mesh().create("mesh1", "geom1");
            model.mesh("mesh1").autoMeshSize(4);
            model.mesh("mesh1").run();
            return model;
          }

          public static void main(String[] args) throws Exception {
            Model model = run();
            if (args.length > 0) model.save(args[0]);
            System.out.println("BASIC_MODEL_OK");
          }
        }
